name: Publicar paquetes Autorizacion

on:
  push:
    branches: [ main ]
    paths:
      - 'Seguridad/Seguridad.MiddlewareAutorizacion/**'
  workflow_dispatch:

permissions: 
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restaurar dependencias
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion" 
          dotnet restore

      - name: Compilar en Release
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet build --configuration Release --no-restore

      - name: Cleanup old .nupkg files
        run: |
          rm -f Seguridad/Seguridad.MiddlewareAutorizacion/nupkgs/*.nupkg

      - name: Empaquetar
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet pack --configuration Release --no-build --output ./nupkgs
      
      - name: Set up NuGet sources
        run: dotnet nuget add source "https://nuget.pkg.github.com/SC-701/index.json" --name "github"
          --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Publicar paquetes en github
        working-directory: Seguridad/Seguridad.MiddlewareAutorizacion
        run: |
          find . -name "*.nupkg" | while read pkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "https://nuget.pkg.github.com/SC-701/index.json" \
              --skip-duplicate
          done
